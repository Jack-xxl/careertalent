<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentAI 分数调试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #6B7280;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .summary-card {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .summary-card h3 {
            font-size: 14px;
            color: #6B7280;
            margin-bottom: 8px;
        }
        
        .summary-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }
        
        .dimension-section {
            margin-bottom: 30px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .dimension-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .dimension-name {
            font-size: 18px;
            font-weight: 600;
        }
        
        .dimension-score {
            font-size: 24px;
            font-weight: 700;
        }
        
        .question-list {
            background: white;
        }
        
        .question-item {
            padding: 15px 20px;
            border-bottom: 1px solid #E5E7EB;
            display: grid;
            grid-template-columns: 80px 1fr 120px 100px 100px;
            gap: 15px;
            align-items: center;
            font-size: 14px;
        }
        
        .question-item:last-child {
            border-bottom: none;
        }
        
        .question-item:hover {
            background: #F9FAFB;
        }
        
        .q-id {
            font-weight: 600;
            color: #667eea;
        }
        
        .q-answer {
            font-weight: 600;
            color: #10B981;
        }
        
        .q-score {
            text-align: center;
            font-weight: 600;
        }
        
        .q-time {
            text-align: center;
            color: #6B7280;
        }
        
        .q-time-bonus {
            text-align: center;
            font-weight: 600;
            color: #F59E0B;
        }
        
        .score-positive {
            color: #10B981;
        }
        
        .score-zero {
            color: #6B7280;
        }
        
        .score-summary {
            background: #F9FAFB;
            padding: 15px 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            font-size: 14px;
        }
        
        .score-summary-item {
            text-align: center;
        }
        
        .score-summary-label {
            color: #6B7280;
            margin-bottom: 5px;
        }
        
        .score-summary-value {
            font-size: 20px;
            font-weight: 700;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #E5E7EB;
            color: #1F2937;
        }
        
        .btn-secondary:hover {
            background: #D1D5DB;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #6B7280;
        }
        
        .error {
            background: #FEE2E2;
            border: 2px solid #EF4444;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            color: #991B1B;
        }
        
        .no-data {
            text-align: center;
            padding: 60px;
            color: #6B7280;
        }
        
        .no-data h3 {
            margin-bottom: 10px;
        }
        
        .header-row {
            padding: 10px 20px;
            background: #F9FAFB;
            border-bottom: 2px solid #E5E7EB;
            display: grid;
            grid-template-columns: 80px 1fr 120px 100px 100px;
            gap: 15px;
            font-weight: 600;
            font-size: 12px;
            color: #6B7280;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 分数调试工具</h1>
        <p class="subtitle">查看每道题的选择和对应分数，核对计算是否正确</p>
        
        <div class="controls">
            <button class="btn-primary" onclick="loadData()">🔄 重新加载</button>
            <button class="btn-secondary" onclick="exportToExcel()">📊 导出Excel</button>
            <button class="btn-secondary" onclick="showRawData()">📋 查看原始数据</button>
        </div>
        
        <div id="summary"></div>
        <div id="content"></div>
    </div>

    <script>
        let questionsData = null;
        let userAnswers = null;
        let userTimings = null;
        
        // 维度映射
        const DIMENSION_MAP = {
            'T1': 'T1_language',
            'T2': 'T2_logic',
            'T3': 'T3_spatial',
            'T4': 'T4_music',
            'T5': 'T5_bodily',
            'T6': 'T6_interpersonal',
            'T7': 'T7_intrapersonal',
            'T8': 'T8_naturalist'
        };
        
        const DIMENSION_NAMES = {
            'T1_language': '语言智能',
            'T2_logic': '逻辑数学智能',
            'T3_spatial': '空间智能',
            'T4_music': '音乐智能',
            'T5_bodily': '身体动觉智能',
            'T6_interpersonal': '人际智能',
            'T7_intrapersonal': '内省智能',
            'T8_naturalist': '自然观察智能'
        };
        
        // 页面加载时自动执行
        window.addEventListener('DOMContentLoaded', loadData);
        
        async function loadData() {
            const contentDiv = document.getElementById('content');
            const summaryDiv = document.getElementById('summary');
            
            contentDiv.innerHTML = '<div class="loading">⏳ 正在加载数据...</div>';
            summaryDiv.innerHTML = '';
            
            try {
                // 1. 加载题目数据
                const response = await fetch('data/t-layer-questions.json');
                if (!response.ok) {
                    throw new Error('题目文件加载失败: ' + response.status);
                }
                questionsData = await response.json();
                
                // 2. 读取用户答案
                const answersStr = localStorage.getItem('talentai_answers');
                const timingsStr = localStorage.getItem('talentai_timings');
                
                if (!answersStr || !timingsStr) {
                    contentDiv.innerHTML = `
                        <div class="no-data">
                            <h3>⚠️ 未找到测评数据</h3>
                            <p>请先完成测评，或在控制台设置测试数据</p>
                            <br>
                            <button class="btn-primary" onclick="setTestData()">设置测试数据</button>
                        </div>
                    `;
                    return;
                }
                
                userAnswers = JSON.parse(answersStr);
                userTimings = JSON.parse(timingsStr);
                
                // 3. 生成详细报告
                generateDetailedReport();
                
            } catch (error) {
                console.error('加载失败:', error);
                contentDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ 加载失败</h3>
                        <p>${error.message}</p>
                        <p>请检查：</p>
                        <ul>
                            <li>data/t-layer-questions.json 文件是否存在</li>
                            <li>localStorage 是否有测评数据</li>
                        </ul>
                    </div>
                `;
            }
        }
        
        function generateDetailedReport() {
            let totalBaseScore = 0;
            let totalTimeBonus = 0;
            let totalQuestions = 0;
            
            const dimensions = Object.keys(DIMENSION_NAMES);
            let html = '';
            
            dimensions.forEach(dimension => {
                const questions = questionsData.questions[dimension];
                const answers = userAnswers[dimension] || [];
                
                let dimensionBaseScore = 0;
                let dimensionTimeBonus = 0;
                
                // 维度标题
                html += `
                    <div class="dimension-section">
                        <div class="dimension-header">
                            <span class="dimension-name">${DIMENSION_NAMES[dimension]}</span>
                            <span class="dimension-score" id="score-${dimension}">--/10</span>
                        </div>
                        <div class="header-row">
                            <div>题号</div>
                            <div>您的选择</div>
                            <div>基础分数</div>
                            <div>答题时间</div>
                            <div>时间加分</div>
                        </div>
                        <div class="question-list">
                `;
                
                // 遍历5道题
                questions.forEach((question, index) => {
                    const answerId = answers[index];
                    const option = question.options.find(opt => opt.id === answerId);
                    const timing = userTimings[question.id] || 0;
                    
                    let baseScore = 0;
                    let timeBonus = 0;
                    
                    if (option) {
                        // 获取基础分数（支持短格式和完整格式）
                        const shortDimension = Object.keys(DIMENSION_MAP).find(
                            key => DIMENSION_MAP[key] === dimension
                        );
                        baseScore = option.scoring[dimension] || option.scoring[shortDimension] || 0;
                        
                        // 计算时间加分
                        if (option.time_bonus && timing > 0) {
                            const thresholdFast = option.time_bonus.threshold_fast;
                            const thresholdNormal = option.time_bonus.threshold_normal || thresholdFast * 2;
                            
                            if (timing <= thresholdFast) {
                                const bonusObj = option.time_bonus.bonus_fast || {};
                                const originalBonus = bonusObj[dimension] || bonusObj[shortDimension] || 0;
                                timeBonus = Math.min(originalBonus * 0.2, 0.1);
                            } else if (timing <= thresholdNormal) {
                                const bonusObj = option.time_bonus.bonus_normal || {};
                                const originalBonus = bonusObj[dimension] || bonusObj[shortDimension] || 0;
                                timeBonus = Math.min(originalBonus * 0.2, 0.05);
                            }
                        }
                    }
                    
                    dimensionBaseScore += baseScore;
                    dimensionTimeBonus += timeBonus;
                    totalQuestions++;
                    
                    const optionText = option ? option.text['zh-CN'] || option.text : '未作答';
                    const scoreClass = baseScore > 0 ? 'score-positive' : 'score-zero';
                    const bonusClass = timeBonus > 0 ? 'score-positive' : 'score-zero';
                    
                    html += `
                        <div class="question-item">
                            <div class="q-id">${question.id}</div>
                            <div>
                                <span class="q-answer">${answerId || '未选择'}</span>
                                <span style="color: #6B7280; margin-left: 10px;">${optionText.substring(0, 30)}${optionText.length > 30 ? '...' : ''}</span>
                            </div>
                            <div class="q-score ${scoreClass}">+${baseScore.toFixed(1)} 分</div>
                            <div class="q-time">${timing}秒</div>
                            <div class="q-time-bonus ${bonusClass}">+${timeBonus.toFixed(2)} 分</div>
                        </div>
                    `;
                });
                
                // 维度小结
                const finalScore = Math.min(dimensionBaseScore + dimensionTimeBonus, 10);
                const displayScore = Math.min(dimensionBaseScore, 10);
                
                html += `
                        </div>
                        <div class="score-summary">
                            <div class="score-summary-item">
                                <div class="score-summary-label">基础分</div>
                                <div class="score-summary-value" style="color: #10B981;">${dimensionBaseScore.toFixed(1)}</div>
                            </div>
                            <div class="score-summary-item">
                                <div class="score-summary-label">时间加分</div>
                                <div class="score-summary-value" style="color: #F59E0B;">+${dimensionTimeBonus.toFixed(2)}</div>
                            </div>
                            <div class="score-summary-item">
                                <div class="score-summary-label">最终得分</div>
                                <div class="score-summary-value" style="color: #667eea;">${finalScore.toFixed(1)}/10</div>
                            </div>
                        </div>
                    </div>
                `;
                
                totalBaseScore += dimensionBaseScore;
                totalTimeBonus += dimensionTimeBonus;
                
                // 更新维度得分
                setTimeout(() => {
                    const scoreElement = document.getElementById(`score-${dimension}`);
                    if (scoreElement) {
                        scoreElement.textContent = `${displayScore.toFixed(1)}/10`;
                    }
                }, 100);
            });
            
            // 显示总体统计
            const summaryHtml = `
                <div class="summary">
                    <div class="summary-card">
                        <h3>总题数</h3>
                        <div class="value">${totalQuestions}</div>
                    </div>
                    <div class="summary-card">
                        <h3>总基础分</h3>
                        <div class="value" style="color: #10B981;">${totalBaseScore.toFixed(1)}</div>
                    </div>
                    <div class="summary-card">
                        <h3>总时间加分</h3>
                        <div class="value" style="color: #F59E0B;">+${totalTimeBonus.toFixed(2)}</div>
                    </div>
                    <div class="summary-card">
                        <h3>平均分/维度</h3>
                        <div class="value" style="color: #667eea;">${(totalBaseScore / 8).toFixed(1)}/10</div>
                    </div>
                </div>
            `;
            
            document.getElementById('summary').innerHTML = summaryHtml;
            document.getElementById('content').innerHTML = html;
        }
        
        function setTestData() {
            const testAnswers = {
                T1_language: ['A', 'C', 'A', 'B', 'A'],
                T2_logic: ['A', 'A', 'B', 'A', 'B'],
                T3_spatial: ['B', 'A', 'B', 'C', 'A'],
                T4_music: ['C', 'B', 'D', 'C', 'B'],
                T5_bodily: ['B', 'C', 'B', 'D', 'C'],
                T6_interpersonal: ['A', 'B', 'A', 'A', 'B'],
                T7_intrapersonal: ['A', 'B', 'A', 'B', 'A'],
                T8_naturalist: ['C', 'B', 'D', 'C', 'D']
            };
            
            const testTimings = {
                'T1_001': 12, 'T1_002': 10, 'T1_003': 18, 'T1_004': 8, 'T1_005': 20,
                'T2_001': 8, 'T2_002': 15, 'T2_003': 12, 'T2_004': 25, 'T2_005': 25,
                'T3_001': 20, 'T3_002': 15, 'T3_003': 12, 'T3_004': 5, 'T3_005': 18,
                'T4_001': 20, 'T4_002': 22, 'T4_003': 25, 'T4_004': 18, 'T4_005': 30,
                'T5_001': 15, 'T5_002': 18, 'T5_003': 20, 'T5_004': 12, 'T5_005': 25,
                'T6_001': 12, 'T6_002': 15, 'T6_003': 10, 'T6_004': 8, 'T6_005': 14,
                'T7_001': 10, 'T7_002': 12, 'T7_003': 8, 'T7_004': 15, 'T7_005': 11,
                'T8_001': 20, 'T8_002': 18, 'T8_003': 22, 'T8_004': 25, 'T8_005': 20
            };
            
            localStorage.setItem('talentai_answers', JSON.stringify(testAnswers));
            localStorage.setItem('talentai_timings', JSON.stringify(testTimings));
            
            alert('✅ 测试数据已设置！');
            loadData();
        }
        
        function showRawData() {
            console.log('=== 原始答案数据 ===');
            console.log(userAnswers);
            console.log('=== 原始时间数据 ===');
            console.log(userTimings);
            alert('原始数据已输出到控制台（按F12查看）');
        }
        
        function exportToExcel() {
            alert('导出Excel功能开发中...');
        }
    </script>
</body>
</html>
