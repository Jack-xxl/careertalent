<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>W层内在驱动力测评 · TalentAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    body { min-height: 100vh; }
    .gradient-text {
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .progress-fill { transition: width 0.35s ease; }

    .w-drag-instruction {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .w-drag-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 768px) {
      .w-drag-layout { grid-template-columns: 1fr; }
    }
    .w-drag-col-title {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }
    .w-options-pool {
      min-height: 280px;
      padding: 12px;
      border-radius: 12px;
      border: 1px dashed rgba(148, 163, 184, 0.25);
      background: rgba(255, 255, 255, 0.02);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .w-options-pool.w-pool--highlight {
      border-color: rgba(102, 126, 234, 0.6);
      background: rgba(102, 126, 234, 0.08);
    }
    .w-option-card {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      cursor: grab;
      user-select: none;
      touch-action: none;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .w-option-card:hover {
      border-color: rgba(102, 126, 234, 0.4);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.15);
    }
    .w-option-card--dragging { opacity: 0.45; }
    .w-option-card--ghost {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.92;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
    }
    .w-option-code {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: rgba(102, 126, 234, 0.25);
      color: #a78bfa;
      font-weight: 700;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .w-option-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.65;
      color: #e5e7eb;
    }
    .w-slot-wrap { margin-bottom: 16px; }
    .w-slot-label {
      font-size: 13px;
      font-weight: 700;
      color: #a78bfa;
      margin-bottom: 8px;
    }
    .w-slot {
      min-height: 88px;
      padding: 10px;
      border-radius: 12px;
      border: 2px dashed rgba(148, 163, 184, 0.35);
      background: rgba(255, 255, 255, 0.02);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .w-slot--highlight {
      border-color: rgba(52, 211, 153, 0.7);
      background: rgba(52, 211, 153, 0.1);
    }
    .w-slot--filled {
      border-style: solid;
      border-color: rgba(102, 126, 234, 0.45);
      justify-content: stretch;
    }
    .w-slot-hint {
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      padding: 8px;
    }
    .w-slot .w-option-card { width: 100%; cursor: grab; }

    #nextBtn.w-next-ready {
      background: linear-gradient(135deg, #22c55e, #10b981) !important;
      box-shadow: 0 8px 24px rgba(34, 197, 94, 0.35);
    }
    #nextBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    .drive-bar {
      font-family: ui-monospace, monospace;
      letter-spacing: 1px;
      color: #34d399;
      font-size: 15px;
    }
    .drive-row { margin-bottom: 18px; }
    .drive-label { font-size: 15px; font-weight: 700; color: #e5e7eb; margin-bottom: 6px; }
    .drive-meta { font-size: 14px; color: #9ca3af; margin-top: 4px; }
    .drive-note {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.75;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(148, 163, 184, 0.15);
    }
    #question-scenario {
      background: rgba(102, 126, 234, 0.06);
      border: 1px solid rgba(102, 126, 234, 0.2);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.8;
      margin-bottom: 16px;
    }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

  <header class="glass-card border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between flex-wrap gap-3">
        <div class="flex items-center gap-3 min-w-0">
          <span class="text-2xl font-black gradient-text shrink-0">TalentAI</span>
          <span class="text-gray-400 text-sm truncate">🧭 W层 · 内在驱动力</span>
        </div>
        <div class="text-right shrink-0">
          <div class="text-sm text-gray-400" id="progress-label">测评进度</div>
          <div class="text-lg font-bold" id="prog-text">第1题，共8题</div>
        </div>
      </div>
      <div class="mt-3 bg-gray-800 rounded-full h-2 overflow-hidden">
        <div id="prog-fill" class="h-full bg-gradient-to-r from-purple-600 to-pink-500 progress-fill" style="width:0%"></div>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8 min-h-[calc(100vh-120px)]">

    <div id="assess-screen" class="screen active">
      <div class="glass-card neon-border p-6 md:p-8 rounded-2xl mb-6">
        <div id="question-scenario"></div>
        <h2 id="question-text" class="text-xl md:text-2xl font-bold leading-relaxed mb-2">正在加载…</h2>
        <div id="w-drag-mount"></div>
      </div>
      <div class="flex items-center justify-between flex-wrap gap-3">
        <button type="button" id="prevBtn" class="glass-card px-6 py-3 rounded-lg font-semibold hover:bg-white/10 transition" disabled>
          <i class="fas fa-arrow-left mr-2"></i>上一题
        </button>
        <button type="button" id="nextBtn" class="neon-btn px-6 py-3 rounded-lg font-semibold" disabled>
          请先完成两个选择
        </button>
      </div>
    </div>

    <div id="result-screen" class="screen">
      <div class="glass-card neon-border p-8 rounded-2xl">
        <h2 class="text-2xl font-bold mb-6">W层驱动力参数</h2>
        <div id="drive-results"></div>
        <div class="drive-note">
          <strong class="text-gray-300">说明：</strong><br>
          以上为当前测评呈现的核心驱动力参数。<br>
          主驱动反映孩子最容易产生自发行动力的情境，<br>
          副驱动为重要补充方向。<br>
          测评结果不直接等同于性格判断或职业建议，<br>
          仅作为成长参考依据。
        </div>
        <button type="button" id="btnContinue" class="neon-btn w-full mt-8 py-4 rounded-xl font-bold text-lg">
          完成，返回综合测评 →
        </button>
      </div>
    </div>

  </main>

  <script src="js/w-layer-scoring.js"></script>
  <script src="js/w-drag-ui.js"></script>
  <script src="js/w-assessment.js"></script>
</body>
</html>
