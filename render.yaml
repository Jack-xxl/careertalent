services:
  - type: web
    name: talentai
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: WECHAT_APPID
        sync: false
      - key: WECHAT_MCHID
        sync: false
      - key: WECHAT_SERIAL_NO
        sync: false
      - key: WECHAT_API_V3_KEY
        sync: false
      - key: WECHAT_CERT
        sync: false
      - key: WECHAT_KEY
        sync: false
      - key: BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false