<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalentAI - 管理后台</title>
  <style>
    :root{
      --bg:#0d1117;
      --bg2:#1a1f2e;
      --panel:rgba(255,255,255,0.05);
      --border:rgba(255,255,255,0.10);
      --text:#eef2ff;
      --muted:rgba(238,242,255,0.72);
      --primary1:#f59e0b;
      --primary2:#fbbf24;
      --shadow:0 14px 40px rgba(0,0,0,0.22);
      --radius:20px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif;
      line-height:1.65;
      background:linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      overflow-x:hidden;
    }
    .container{max-width:1140px;margin:0 auto;padding:26px 16px 72px}
    .wrap{min-height:calc(100vh - 98px);display:flex;align-items:flex-start;justify-content:center}
    .card{
      width:min(980px, 100%);
      padding:22px 20px;
      border-radius:var(--radius);
      background:var(--panel);
      border:1px solid rgba(255,255,255,0.09);
      box-shadow:var(--shadow);
      backdrop-filter:blur(8px);
    }
    h1{
      font-size:28px;
      font-weight:1000;
      letter-spacing:-0.2px;
      margin-bottom:6px;
      background:linear-gradient(135deg, #fbbf24, #f59e0b, #8b5cf6);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .sub{color:var(--muted);font-weight:800;font-size:14px;margin-bottom:18px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .input{
      flex:1;
      min-width:220px;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.10);
      color:var(--text);
      outline:none;
      font-weight:900;
    }
    .input::placeholder{color:rgba(238,242,255,0.35);font-weight:800}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:10px;
      padding:11px 16px;border-radius:14px;cursor:pointer;
      transition:transform .15s ease, background .2s ease, border-color .2s ease, opacity .2s ease;
      user-select:none;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.03);
      color:var(--text);
      font-weight:1000;font-size:14px;white-space:nowrap;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn:active{transform:translateY(0px)}
    .btn-primary{
      border:none;
      background:linear-gradient(135deg, var(--primary1) 0%, var(--primary2) 100%);
      color:#1b1305;
      box-shadow:0 10px 28px rgba(245,158,11,0.18);
    }
    .btn-primary:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}

    .stats{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin:14px 0 12px;
    }
    .chip{
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      color:rgba(238,242,255,0.88);
      font-weight:1000;
      font-size:13px;
    }

    .table-wrap{
      margin-top:10px;
      border:1px solid rgba(255,255,255,0.10);
      border-radius:16px;
      overflow:hidden;
      background:rgba(255,255,255,0.02);
    }
    table{width:100%;border-collapse:collapse}
    thead{background:rgba(255,255,255,0.03)}
    th, td{
      text-align:left;
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      font-size:13px;
      font-weight:900;
      color:rgba(238,242,255,0.88);
      vertical-align:top;
    }
    td{font-weight:800;color:rgba(238,242,255,0.80)}
    tr:hover td{background:rgba(255,255,255,0.02)}
    .muted{color:rgba(238,242,255,0.55);font-weight:900;font-size:12px;margin-top:10px}
    .error{color:rgba(254,226,226,0.95);font-weight:900;font-size:12px;margin-top:10px;display:none}

    @media (max-width: 640px){
      .card{padding:18px 16px}
      h1{font-size:24px}
      th, td{padding:10px 12px}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="wrap">
      <div class="card">
        <h1>管理后台</h1>
        <div class="sub">输入管理员密码后查看用户列表</div>

        <div class="row">
          <input class="input" id="key" type="password" placeholder="请输入 admin key（admin888）" />
          <button class="btn btn-primary" id="loadBtn">加载数据</button>
        </div>

        <div class="stats" id="stats" style="display:none;">
          <div class="chip">总用户数：<span id="total">0</span></div>
        </div>

        <div class="error" id="err"></div>
        <div class="muted" id="hint"></div>

        <div class="table-wrap" id="tableWrap" style="display:none;">
          <table>
            <thead>
              <tr>
                <th style="width:180px;">手机号</th>
                <th style="width:140px;">昵称</th>
                <th style="width:120px;">年龄段</th>
                <th style="width:160px;">身份</th>
                <th style="width:200px;">注册时间</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    function qs(sel){ return document.querySelector(sel); }
    const keyEl = qs('#key');
    const loadBtn = qs('#loadBtn');
    const stats = qs('#stats');
    const total = qs('#total');
    const tableWrap = qs('#tableWrap');
    const tbody = qs('#tbody');
    const err = qs('#err');
    const hint = qs('#hint');

    function setError(msg){
      err.textContent = msg || '';
      err.style.display = msg ? 'block' : 'none';
    }
    function fmtTime(v){
      if(!v) return '';
      const d = new Date(v);
      if (Number.isNaN(d.getTime())) return String(v);
      return d.toLocaleString();
    }

    async function loadUsers(){
      setError('');
      const key = String(keyEl.value || '').trim();
      if (key !== 'admin888'){
        setError('密码错误');
        stats.style.display = 'none';
        tableWrap.style.display = 'none';
        return;
      }

      loadBtn.disabled = true;
      loadBtn.textContent = '加载中...';
      hint.textContent = '正在请求数据...';

      try{
        const API_BASE = 'https://careertalent-1.onrender.com';
        const url = (window.location.protocol === 'file:')
          ? `${API_BASE}/admin/users?key=${encodeURIComponent(key)}`
          : `/admin/users?key=${encodeURIComponent(key)}`;

        const resp = await fetch(url);
        const data = await resp.json().catch(() => ({}));
        if(!resp.ok || !data.ok) throw new Error(data && data.message ? data.message : `加载失败（HTTP ${resp.status}）`);

        const users = Array.isArray(data.users) ? data.users : [];
        total.textContent = String(users.length);
        stats.style.display = 'flex';

        tbody.innerHTML = users.map(u => {
          const phone = u.phone || '';
          const nickname = u.nickname || '';
          const age = u.age_group || '';
          const role = u.role || '';
          const created = fmtTime(u.created_at);
          return `
            <tr>
              <td>${escapeHtml(phone)}</td>
              <td>${escapeHtml(nickname)}</td>
              <td>${escapeHtml(age)}</td>
              <td>${escapeHtml(role)}</td>
              <td>${escapeHtml(created)}</td>
            </tr>
          `;
        }).join('');

        tableWrap.style.display = 'block';
        hint.textContent = '';
      }catch(e){
        setError((e && e.message) ? e.message : String(e || '加载失败'));
        hint.textContent = '';
        stats.style.display = 'none';
        tableWrap.style.display = 'none';
      }finally{
        loadBtn.disabled = false;
        loadBtn.textContent = '加载数据';
      }
    }

    function escapeHtml(s){
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    loadBtn.addEventListener('click', loadUsers);
    keyEl.addEventListener('keydown', function(e){
      if (e.key === 'Enter') loadUsers();
    });
  </script>
</body>
</html>
