<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T层测评 - TalentAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .progress-ring {
      transform: rotate(-90deg);
    }
    .progress-ring-circle {
      transition: stroke-dashoffset 0.3s;
    }
    .option-card {
      transition: all 0.3s;
      cursor: pointer;
    }
    .option-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }
    .option-card.selected {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
    }
  </style>
</head>
<body class="bg-gray-900 text-white">

  <!-- Header -->
  <header class="glass-card border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <a href="index.html" class="text-2xl font-black gradient-text">TalentAI</a>
          <span class="text-gray-400 text-sm">T层天赋测评</span>
        </div>
        
        <!-- Progress Info -->
        <div class="flex items-center gap-6">
          <div class="text-right">
            <div class="text-sm text-gray-400">进度</div>
            <div class="text-lg font-bold" id="progress-text">0/40</div>
          </div>
          
          <!-- Timer -->
          <div class="flex items-center gap-2">
            <i class="fas fa-clock text-purple-400"></i>
            <span id="timer" class="font-mono text-lg">30:00</span>
          </div>
        </div>
      </div>
      
      <!-- Progress Bar -->
      <div class="mt-4 bg-gray-800 rounded-full h-2 overflow-hidden">
        <div id="progress-bar" class="h-full bg-gradient-to-r from-purple-600 to-pink-500 transition-all duration-300" style="width: 0%"></div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 py-12">
    
    <!-- Welcome Screen -->
    <div id="welcome-screen" class="text-center">
      <div class="glass-card neon-border p-12 rounded-2xl">
        <div class="w-24 h-24 mx-auto mb-6 bg-gradient-to-br from-purple-600 to-pink-500 rounded-full flex items-center justify-center">
          <i class="fas fa-brain text-4xl"></i>
        </div>
        
        <h1 class="text-4xl font-black mb-4">T层天赋基础测评</h1>
        <p class="text-xl text-gray-300 mb-8">8大智能维度 · 40道题 · 约30分钟</p>
        
        <div class="bg-purple-900/30 border border-purple-500 rounded-xl p-6 mb-8 text-left">
          <h3 class="text-lg font-bold mb-4 text-purple-400">
            <i class="fas fa-info-circle mr-2"></i>测评说明
          </h3>
          <ul class="space-y-2 text-gray-300">
            <li><i class="fas fa-check text-green-400 mr-2"></i>请根据真实情况作答，没有对错之分</li>
            <li><i class="fas fa-check text-green-400 mr-2"></i>每题限时60秒，请在直觉驱使下快速选择</li>
            <li><i class="fas fa-check text-green-400 mr-2"></i>可随时暂停，进度自动保存</li>
            <li><i class="fas fa-check text-green-400 mr-2"></i>完成后立即查看免费报告</li>
          </ul>
        </div>
        
        <button onclick="startAssessment()" class="neon-btn text-white px-12 py-4 rounded-xl font-bold text-lg">
          <i class="fas fa-play mr-2"></i>开始测评
        </button>
      </div>
    </div>

    <!-- Question Screen -->
    <div id="question-screen" class="hidden">
      
      <!-- Dimension Badge -->
      <div class="mb-6 flex items-center justify-center">
        <div class="glass-card px-6 py-2 rounded-full">
          <span class="text-sm text-gray-400">当前维度：</span>
          <span id="current-dimension" class="font-bold text-purple-400 ml-2">语言智能</span>
        </div>
      </div>

      <!-- Question Card -->
      <div class="glass-card neon-border p-8 rounded-2xl mb-8">
        <div class="mb-6">
          <div class="text-sm text-gray-400 mb-2">
            第 <span id="question-number">1</span> 题
          </div>
          <h2 id="question-text" class="text-2xl font-bold leading-relaxed">
            题目加载中...
          </h2>
        </div>
        
        <!-- Options -->
        <div id="options-container" class="space-y-4">
          <!-- Options will be dynamically inserted -->
        </div>
      </div>

      <!-- Navigation -->
      <div class="flex items-center justify-between">
        <button onclick="previousQuestion()" id="prev-btn" class="glass-card px-6 py-3 rounded-lg font-semibold hover:bg-white/10 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          <i class="fas fa-arrow-left mr-2"></i>上一题
        </button>
        
        <div class="text-center">
          <button onclick="pauseAssessment()" class="text-gray-400 hover:text-white transition">
            <i class="fas fa-pause-circle mr-1"></i>暂停保存
          </button>
        </div>
        
        <button onclick="nextQuestion()" id="next-btn" class="neon-btn px-6 py-3 rounded-lg font-semibold disabled:opacity-50 disabled:cursor-not-allowed" disabled>
          下一题<i class="fas fa-arrow-right ml-2"></i>
        </button>
      </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="hidden text-center">
      <div class="glass-card neon-border p-12 rounded-2xl">
        <div class="w-24 h-24 mx-auto mb-6">
          <svg class="animate-spin" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="8" fill="none" class="text-gray-700"/>
            <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="8" fill="none" class="text-purple-500" stroke-dasharray="251" stroke-dashoffset="125" stroke-linecap="round"/>
          </svg>
        </div>
        <h2 class="text-2xl font-bold mb-4">正在分析您的答案...</h2>
        <p class="text-gray-400">请稍候，即将生成测评报告</p>
      </div>
    </div>

  </main>

  <!-- Scripts -->
  <script src="js/assessment.js"></script>
</body>
</html>
