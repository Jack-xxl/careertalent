<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P + W + M 综合测评 · TalentAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/w-drag-ui.css?v=20260619" />
  <style>
    body { min-height: 100vh; }
    .gradient-text {
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .option-card {
      transition: all 0.3s;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 16px 18px;
    }
    .option-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.25);
    }
    .option-card.selected {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.18);
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.35);
    }
    .progress-fill { transition: width 0.35s ease; }
    #question-scenario {
      background: rgba(102,126,234,0.06);
      border: 1px solid rgba(102,126,234,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.8;
      white-space: pre-line;
      margin-bottom: 20px;
    }
    .force-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      margin-bottom: 12px;
    }
    .section-intro-chip {
      font-size: 12px;
      color: #a78bfa;
      margin-top: 4px;
      line-height: 1.5;
    }
    #loading-screen .spinner-ring {
      width: 96px; height: 96px; margin: 0 auto 24px;
    }
    .w-drag-instruction { font-size: 14px; color: #9ca3af; margin-bottom: 20px; line-height: 1.6; }
    #nextBtn.w-next-ready {
      background: linear-gradient(135deg, #22c55e, #10b981) !important;
      box-shadow: 0 8px 24px rgba(34,197,94,0.35);
    }
    .m-option {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 16px 18px; border-radius: 12px; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      transition: all 0.25s;
    }
    .m-option:hover { border-color: rgba(102,126,234,0.4); transform: translateY(-1px); }
    .m-option.selected {
      border-color: #667eea;
      background: rgba(102,126,234,0.18);
      box-shadow: 0 0 20px rgba(102,126,234,0.35);
    }
    .m-option-code {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 8px;
      background: rgba(102,126,234,0.2); color: #a78bfa; font-weight: 700; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }
    .m-option.selected .m-option-code { background: rgba(102,126,234,0.5); color: #fff; }
    .m-option-text { flex: 1; font-size: 15px; line-height: 1.65; color: #e5e7eb; }
    #nextBtn.m-next-ready {
      background: linear-gradient(135deg, #22c55e, #10b981) !important;
      box-shadow: 0 8px 24px rgba(34,197,94,0.35);
    }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

  <header class="glass-card border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between flex-wrap gap-3">
        <div class="flex items-center gap-3 min-w-0">
          <span class="text-2xl font-black gradient-text shrink-0">TalentAI</span>
          <span class="text-gray-400 text-sm truncate" id="current-layer-badge">P + W + M 综合测评</span>
        </div>
        <div class="flex items-center gap-6 shrink-0">
          <div class="text-right">
            <div class="text-sm text-gray-400" id="progress-label">P + W + M 综合测评进度</div>
            <div class="text-lg font-bold" id="prog-text">0/57</div>
          </div>
          <div class="flex items-center gap-2">
            <i class="fas fa-clock text-purple-400"></i>
            <span id="timer-display" class="font-mono text-lg">00:00</span>
          </div>
        </div>
      </div>
      <div class="mt-3 flex justify-between text-xs text-gray-500">
        <span id="header-section-hint">共57题 · 预计10-20分钟完成</span>
        <span id="progress-count"></span>
      </div>
      <div class="mt-3 bg-gray-800 rounded-full h-2 overflow-hidden">
        <div id="prog-fill" class="h-full bg-gradient-to-r from-purple-600 to-pink-500 progress-fill" style="width:0%"></div>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 min-h-[calc(100vh-120px)]">

    <!-- 答题主界面 -->
    <div id="assess-root" class="screen active">

      <div id="pwm-intro" class="glass-card px-5 py-4 rounded-xl mb-5 text-sm text-gray-400 leading-relaxed">
        <div class="text-white font-semibold mb-2">P + W + M 综合测评</div>
        <div>P层性格特征（25题）</div>
        <div>W层内在驱动力（8题）</div>
        <div>M层思维模式（24题）</div>
        <div class="text-purple-300 mt-2 font-medium">共57题 · 预计10-20分钟完成</div>
      </div>

      <div class="mb-5 flex items-center justify-between flex-wrap gap-3">
        <div class="glass-card px-5 py-2 rounded-full max-w-full">
          <span class="text-sm text-gray-400">当前部分：</span>
          <span id="current-layer-badge-q" class="font-bold text-purple-400 ml-1">第一部分：P层性格特征</span>
        </div>
        <div class="text-sm text-gray-400" id="current-layer-q">第 1 / 25 题</div>
      </div>

      <div id="sectionBanner" class="glass-card px-5 py-3 rounded-xl mb-5" style="display:none;">
        <div class="font-bold text-purple-300 text-sm" id="sectionTitle"></div>
        <div class="section-intro-chip" id="sectionDesc"></div>
      </div>

      <div class="glass-card neon-border p-8 rounded-2xl mb-6 min-h-[560px] flex flex-col">
        <div class="text-sm text-gray-500 mb-2">
          全局第 <span id="question-number-global">1</span> 题
        </div>
        <div id="force-choice-label" class="force-badge" style="display:none">
          ⚡ 强迫二选一 · 只能选其中一个
        </div>
        <h2 id="question-text" class="text-2xl font-bold leading-relaxed mb-4 flex-grow">正在加载题目…</h2>
        <div id="question-scenario" style="display:none"></div>
        <div id="w-drag-mount" style="display:none;width:100%"></div>
        <div id="options-container" class="space-y-4"></div>
      </div>

      <div class="flex items-center justify-between flex-wrap gap-3">
        <button type="button" id="prevBtn"
          class="glass-card px-6 py-3 rounded-lg font-semibold hover:bg-white/10 transition">
          <i class="fas fa-arrow-left mr-2"></i>上一题
        </button>
        <button type="button" id="btn-pause" class="text-gray-500 hover:text-white transition text-sm">
          <i class="fas fa-pause-circle mr-1"></i>暂停保存
        </button>
        <button type="button" id="nextBtn"
          class="neon-btn px-6 py-3 rounded-lg font-semibold" disabled>
          下一题<i class="fas fa-arrow-right ml-2"></i>
        </button>
      </div>
    </div>

    <!-- 提交加载 -->
    <div id="loading-root" class="screen">
      <div id="loading-screen" class="glass-card neon-border p-12 rounded-2xl text-center max-w-lg mx-auto mt-8">
        <div class="spinner-ring">
          <svg class="animate-spin w-full h-full" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="8" fill="none" class="text-gray-700"/>
            <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="8" fill="none" class="text-purple-500"
                    stroke-dasharray="251" stroke-dashoffset="125" stroke-linecap="round"/>
          </svg>
        </div>
        <h2 class="text-2xl font-bold mb-2">正在生成完整成长导航报告</h2>
        <p class="text-gray-400">P层性格特征 · W层内在驱动力 · M层思维模式 综合分析中…</p>
      </div>
    </div>

  </main>

  <script src="js/t-careers-store.js"></script>
  <script src="js/shuffled-choice.js"></script>
  <script src="js/w-layer-scoring.js?v=20260618"></script>
  <script src="js/w-drag-ui.js?v=20260619"></script>
  <script src="js/m-layer-scoring.js"></script>
  <script src="js/pwm-assessment.js"></script>
</body>
</html>
