<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>寻路者已解锁 · Top1 & Top3 · TalentAI</title>
  <style>
    :root {
      --bg: #050816;
      --card: rgba(15, 23, 42, 0.92);
      --text: #e5e7eb;
      --sub: #94a3b8;
      --accent: #34d399;
      --gold: #fbbf24;
      --border: rgba(52, 211, 153, 0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #0f172a 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px 56px;
    }
    .wrap { max-width: 760px; margin: 0 auto; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; letter-spacing: 0.14em; color: var(--accent);
      margin-bottom: 14px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 10px; line-height: 1.3; }
    .sub { font-size: 15px; color: var(--sub); line-height: 1.65; margin-bottom: 28px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 18px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.25);
    }
    .rank { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
    .match { font-size: 32px; font-weight: 800; color: var(--accent); float: right; margin-top: -32px; }
    .name { font-size: 18px; font-weight: 700; margin-bottom: 10px; padding-right: 80px; line-height: 1.35; }
    .desc { font-size: 13px; color: var(--sub); line-height: 1.6; min-height: 44px; }
    .meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
    .meta-box {
      text-align: center; padding: 8px 4px; border-radius: 10px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(148,163,184,0.2);
    }
    .meta-label { font-size: 10px; color: var(--sub); margin-bottom: 4px; }
    .meta-val { font-size: 12px; font-weight: 700; }
    .cta-box {
      background: linear-gradient(145deg, rgba(6,78,59,0.35), rgba(15,23,42,0.95));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px 20px;
      text-align: center;
    }
    .cta-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .cta-sub { font-size: 13px; color: var(--sub); margin-bottom: 20px; line-height: 1.55; }
    .btn-primary {
      display: block; width: 100%; max-width: 420px; margin: 0 auto 14px;
      padding: 17px 22px; border: none; border-radius: 999px;
      background: linear-gradient(135deg, #22c55e, #10b981);
      color: #fff; font-size: 18px; font-weight: 800; cursor: pointer;
      box-shadow: 0 8px 28px rgba(34,197,94,0.35);
    }
    .btn-secondary {
      display: inline-block; font-size: 14px; color: #a7f3d0;
      text-decoration: underline; cursor: pointer; background: none; border: none;
      margin-top: 4px;
    }
    .warn {
      text-align: center; padding: 20px; color: #fbbf24; font-size: 14px; line-height: 1.6;
      border: 1px dashed rgba(251,191,36,0.4); border-radius: 12px; margin-bottom: 20px;
    }
    .warn a { color: #6ee7b7; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge"><span class="dot"></span> TALENTAI · 寻路者 ¥49 已解锁</div>
    <h1>你的 Top1 与 Top3 高匹配职业</h1>
    <p class="sub">付款已解锁 T 层第 1、3 名职业方向。请继续完成 P 层性格测评，生成 T×P 综合报告。</p>

    <div id="careersArea"></div>

    <div class="cta-box" id="ctaBox" style="display:none;">
      <div class="cta-title">下一步 · P 层性格深度测评</div>
      <p class="cta-sub">约 30 题 · 15 分钟</p>
      <button type="button" class="btn-primary" id="btnPStart">开始 P 层性格深度测评 →</button>
      <button type="button" class="btn-secondary" id="btnPReport" style="display:none;">查看综合报告</button>
    </div>
  </div>

  <script src="js/t-careers-store.js"></script>
  <script>
    function isPathfinderPaid() {
      return (
        localStorage.getItem('talentai_premium') === '1' ||
        localStorage.getItem('talentai_paid') === '1' ||
        localStorage.getItem('talentai_p_paid') === '1'
      );
    }

    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderCard(c, rank, medal) {
      if (!c) return '';
      const aiR = c.aiImpact?.replacementRisk ?? '--';
      const newbie = c.aiImpact?.newbieAdvantage ?? '--';
      const salary = c.aiImpact?.salaryRange ?? '--';
      const ms = c.matchScore ?? '--';
      return `
        <div class="card">
          <div class="rank">${medal} 第 ${rank} 名</div>
          <div class="match">${ms}%</div>
          <div class="name">${esc(c.name)}</div>
          <p class="desc">${esc(c.description || '基于你的 T 层天赋结构，该方向与核心能力匹配度较高。')}</p>
          <div class="meta">
            <div class="meta-box"><div class="meta-label">AI 替代风险</div><div class="meta-val">${aiR}${aiR !== '--' ? '%' : ''}</div></div>
            <div class="meta-box"><div class="meta-label">新人优势</div><div class="meta-val">${newbie}${newbie !== '--' ? '%' : ''}</div></div>
            <div class="meta-box"><div class="meta-label">薪资范围</div><div class="meta-val">${esc(salary)}</div></div>
          </div>
        </div>`;
    }

    function renderPage() {
      const area = document.getElementById('careersArea');
      const cta = document.getElementById('ctaBox');
      const store = window.TCareersStore;

      if (!store) {
        area.innerHTML = '<p class="warn">职业数据模块未加载，请刷新页面。</p>';
        return;
      }

      store.migrateFromLegacy();
      const top1 = store.getTop1();
      const top3 = store.getTop3();

      if (!top1 || !top3) {
        area.innerHTML =
          '<p class="warn">未读取到 Top1/Top3 数据。请先完成 <a href="assessment.html">T 层测评</a> 与 <a href="result.html">结果页</a>，再完成 ¥49 支付。</p>';
        cta.style.display = 'block';
        return;
      }

      area.innerHTML =
        '<div class="grid">' +
        renderCard(top1, 1, '🥇') +
        renderCard(top3, 3, '🥉') +
        '</div>';
      cta.style.display = 'block';

      if (store.hasPLayerData()) {
        document.getElementById('btnPReport').style.display = 'inline-block';
      }
    }

    document.getElementById('btnPStart').addEventListener('click', function () {
      window.location.href = 'p_assessment.html';
    });
    document.getElementById('btnPReport').addEventListener('click', function () {
      window.location.href = 'talentai_v3.html';
    });

    (function init() {
      if (!isPathfinderPaid()) {
        window.location.href = 'payment.html?package=pathfinder';
        return;
      }
      renderPage();
    })();
  </script>
</body>
</html>
