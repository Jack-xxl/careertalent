<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>微信支付 · 解锁终极报告</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:#0b0f1c;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    width:100%;
    max-width:420px;
    text-align:center;
    padding:30px;
}
.price{
    font-size:36px;
    font-weight:700;
    color:#22c55e;
}
.status{
    margin:15px 0;
    font-size:14px;
    color:#9ca3af;
}
.qr-box{
    background:#111827;
    padding:20px;
    border-radius:16px;
    margin:25px 0;
}
.qr-placeholder{
    width:200px;
    height:200px;
    background:#fff;
    margin:0 auto;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#000;
    font-weight:bold;
}
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
}
.btn-green{
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
}
.hidden{
    display:none;
}
</style>
</head>
<body>

<div class="container">

    <h2>微信支付</h2>
    <div class="price">¥150</div>

    <div class="status" id="payStatus">
        请使用微信扫码支付
    </div>

    <div class="qr-box">
        <div class="qr-placeholder" id="qrPlaceholder">
            <div id="qrLoading">正在获取二维码...</div>
        </div>
        <img id="qrImg" style="display:none;width:200px;height:200px;border-radius:12px;" alt="微信支付二维码" />
    </div>

    <button class="btn btn-green" id="btnPaidHint" style="display:none;">
        已付款，正在跳转...
    </button>

    <button class="btn btn-green" id="btnManualConfirm" style="display:none;margin-top:12px;background:#374151;">
        我已完成支付（本地校验）
    </button>

</div>

<script>
// =============================
// Render 全自动微信支付（Native 扫码支付）
// =============================
function isValidPhone(phone) {
  return /^1[3-9]\d{9}$/.test(String(phone || '').trim());
}

function renderQrToImg(codeUrl) {
  const qrImg = document.getElementById('qrImg');
  const qrPlaceholder = document.getElementById('qrPlaceholder');
  const qrLoading = document.getElementById('qrLoading');
  if (!qrImg) return;

  const qrService =
    'https://api.qrserver.com/v1/create-qr-code/?size=' +
    encodeURIComponent('200x200') +
    '&data=' +
    encodeURIComponent(codeUrl);

  if (qrLoading) qrLoading.textContent = '等待扫码...';
  if (qrPlaceholder) qrPlaceholder.style.display = 'none';
  qrImg.src = qrService;
  qrImg.style.display = 'block';
}

function handlePaid() {
  document.getElementById("payStatus").innerText = "已付款，正在跳转...";
  const btnPaidHint = document.getElementById("btnPaidHint");
  if (btnPaidHint) btnPaidHint.style.display = 'block';

  // 写入支付标记
  localStorage.setItem('talentai_wma_paid','1');
  localStorage.setItem('talentai_wma_paid_at', new Date().toISOString());

  // 清除旧测评数据
  localStorage.removeItem('talentai_wma_completed_at');
  localStorage.removeItem('talentai_wma_answers');
  localStorage.removeItem('talentai_wma_layer');
  localStorage.removeItem('talentai_wma_q');
  localStorage.removeItem('talentai_wma_timer');

  setTimeout(()=>{
    window.location.href = "wma-assessment.html";
  }, 300);
}

async function startPolling(phone) {
  const packageType = 150;
  const timer = setInterval(async () => {
    try {
      const r = await fetch(
        `/api/check-payment?phone=${encodeURIComponent(phone)}&packageType=${packageType}`
      );
      const data = await r.json();
      if (data && data.paid) {
        clearInterval(timer);
        handlePaid();
      }
    } catch (e) {
      // 忽略网络错误，下一轮继续
    }
  }, 3000);
}

(async function initWmaPayment() {
  const phone = localStorage.getItem('talentai_user_phone');
  const packageType = 150;

  if (!isValidPhone(phone)) {
    document.getElementById("payStatus").innerText = "未获取到手机号，请先登录/注册后再付款。";
    return;
  }

  try {
    document.getElementById("payStatus").innerText = "正在创建微信订单...";
    const resp = await fetch('/api/create-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, packageType }),
    });
    const data = await resp.json();
    if (!data || !data.ok || !data.qrCodeUrl) {
      throw new Error(data?.message || data?.error || '创建订单失败');
    }

    document.getElementById("payStatus").innerText = "请打开微信扫码支付";
    renderQrToImg(data.qrCodeUrl);

    const cfgRes = await fetch('/api/payment-config');
    const cfg = await cfgRes.json().catch(() => ({}));

    if (cfg.wechatNotifyEnabled) {
      await startPolling(phone);
    } else {
      const btn = document.getElementById('btnManualConfirm');
      if (btn) {
        btn.style.display = 'block';
        btn.onclick = async () => {
          try {
            btn.disabled = true;
            btn.textContent = '正在校验...';
            const markRes = await fetch('/api/local-mark-paid', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ phone, packageType: 150 }),
            });
            const markData = await markRes.json();
            if (!markData.ok) throw new Error(markData.message || '本地标记失败');
            const checkRes = await fetch(
              `/api/check-payment?phone=${encodeURIComponent(phone)}&packageType=150`
            );
            const checkData = await checkRes.json();
            if (checkData && checkData.paid) {
              handlePaid();
            } else {
              btn.disabled = false;
              btn.textContent = '我已完成支付（本地校验）';
              alert('未检测到已付款');
            }
          } catch (err) {
            btn.disabled = false;
            btn.textContent = '我已完成支付（本地校验）';
            alert(err.message || String(err));
          }
        };
      }
    }
  } catch (e) {
    console.error(e);
    document.getElementById("payStatus").innerText =
      "创建订单失败：" + (e?.message || String(e));
  }
})();

</script>

</body>
</html>
